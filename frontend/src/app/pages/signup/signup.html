<mat-card class="signup-card mat-elevation-z8">
  <div class="header">
    <h2>Signup</h2>
    <p class="subtitle">Create your account</p>
  </div>

  <form #signupForm="ngForm" (ngSubmit)="onSignup(signupForm)">

    <!-- First Name -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>First Name</mat-label>
      <mat-icon matPrefix>person</mat-icon>
      <input
        matInput
        name="firstName"
        [(ngModel)]="firstName"
        required />
    </mat-form-field>

    <!-- Last Name -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Last Name</mat-label>
      <mat-icon matPrefix>person</mat-icon>
      <input
        matInput
        name="lastName"
        [(ngModel)]="lastName"
        required />
    </mat-form-field>

    <!-- Email -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <mat-icon matPrefix>email</mat-icon>
      <input
        matInput
        type="email"
        name="email"
        [(ngModel)]="email"
        required
        #emailRef="ngModel"
        pattern="^[^ @]+@[^ @]+\.[^ @]{2,}$"
 />
    </mat-form-field>

    <!-- Email error -->
    <p class="error" *ngIf="emailRef.invalid && emailRef.touched">
      Please enter a valid email address
    </p>

    <!-- Password -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Password</mat-label>
      <mat-icon matPrefix>lock</mat-icon>
      <input
        matInput
        type="password"
        name="password"
        [(ngModel)]="password"
        required />
    </mat-form-field>

    <!-- Confirm Password -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirm Password</mat-label>
      <mat-icon matPrefix>lock</mat-icon>
      <input
        matInput
        type="password"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        required />
    </mat-form-field>

    <!-- Global error -->
    <p class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

    <button
      mat-raised-button
      color="primary"
      class="full-width signup-btn"
      type="submit"
      [disabled]="signupForm.invalid">
      Signup
    </button>

  </form>

  <div class="footer">
    <span>Already have an account?</span>
    <a routerLink="/login">Login</a>
  </div>
</mat-card>
